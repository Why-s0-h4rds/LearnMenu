<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="mode-layout">
            <button id="btn-kitchen" class="mode-btn active" onclick="setMode('кухня')">КУХНЯ</button>
            <button id="btn-bar" class="mode-btn" onclick="setMode('6ap')">БАР / ВИНА</button>
        </div>
        
        <div class="settings-layout">
            <label for="questions-input">Вопросов:</label>
            <input type="number" id="questions-input" value="5" min="1" max="20">
            <button id="btn-restart" onclick="startGame()">Старт</button>
        </div>
        
        <div class="stats-layout">
            <span id="lbl-progress">Позиция 0 из 0</span>
            <span id="lbl-errors" class="error-text">Ошибок: 0</span>
            <span id="lbl-remains" class="remainstext">Осталось: 0</span>
        </div>
        
        <div class="question-header">
            <p id="lbl-type" class="hint-text">Соберите состав позиции:</p>
            <h1 id="lbl-item-name">Название блюда</h1>
        </div>
        
        <div id="grid-container" class="grid-container"></div>
    </div>
    
    <script src="menu_data.js"></script>
    <script src="app.js"></script>
</body>
</html>
